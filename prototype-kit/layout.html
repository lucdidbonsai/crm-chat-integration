<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonsai Prototype</title>
  <link rel="stylesheet" href="styles/application.css" />
  <style>
    /*
     * Prototype-only overrides.
     * The real app sets these CSS custom properties via React inline styles.
     * We hardcode the "theme_default" (light) values here.
     */

    /* Sidebar theme variables (normally set by Sidenav.tsx inline styles) */
    .sidenav {
      --sidebar-primary-bg: var(--bg-sidebar, #ffffff);
      --sidebar-primary-border: var(--border-content-alt, #d7d9d5);
      --sidenav-text-color: var(--text-default, #121212);
      --sidenav-item-hover-bg: var(--bg-hover-subtle, #fcfcfc);
      --sidenav-item-selected-bg: var(--bg-grey-f1, #f1f1f1);
    }

    /*
     * Sidebar icon overrides.
     * application.css uses position:absolute + named modifier classes (.home, .deals, etc.)
     * to position each icon. ALWAYS add the named class to every sidebar SVG icon,
     * e.g. class="sidenav-features-item-icon home".
     * Without the named class the icon will be mispositioned.
     *
     * application.css also sets fill:currentColor on paths, which would fill stroke-based
     * icons. The rule below overrides that so stroke-only icons render correctly.
     * Exception: .more circles need fill to appear as solid dots.
     */
    .sidenav-features-item-icon path,
    .sidenav-features-item-icon line,
    .sidenav-features-item-icon rect,
    .sidenav-features-item-icon circle {
      stroke: var(--sidenav-text-color);
      fill: none !important;
    }
    /* meetings — no built-in CSS class, mirrors scheduling-icon positioning */
    .sidenav-features-item-icon.meetings {
      top: 9px;
      left: 11px;
      width: 15px;
    }
    /* three-dot circles need fill */
    .sidenav-features-item-icon.more circle {
      fill: var(--sidenav-text-color) !important;
      stroke: none !important;
    }

    /* Active state */
    .sidenav-features-item.active {
      color: var(--sidenav-text-color);
    }

    /*
     * Sidebar collapse — animate width + topbar offset (application.css already
     * handles transitions on #outer-wrapper padding-left and #navigation left).
     * Toggle `.sidenav-container--collapsed` + remove `.with-sidebar-expanded`
     * from `#outer-wrapper` via JS to switch states.
     */
    .sidenav-container {
      transition: width 150ms ease;
    }

    /* Avatar: prevent squish + override avatar-xs padding-top that fights flex centering */
    .sidenav-company-menu-avatar {
      flex-shrink: 0;
      padding-top: 0 !important;
    }

    /* Collapse toggle: hidden at rest, visible on sidenav hover */
    .sidenav-company-switcher-collapse-toggle {
      opacity: 0;
      transition: opacity 150ms ease;
      position: relative;
    }
    .sidenav-container:hover .sidenav-company-switcher-collapse-toggle {
      opacity: 1;
    }

    /* Tooltip on the toggle button */
    .sidenav-company-switcher-collapse-toggle::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 100ms ease;
      z-index: 9999;
    }
    .sidenav-company-switcher-collapse-toggle:hover::after {
      opacity: 1;
    }

    /* Collapsed search: hide form input, show icon-only nav item */
    .sidenav-container--collapsed .sidenav-top-section-search-input {
      display: none;
    }
    .sidenav-search-collapsed-item {
      display: none;
    }
    .sidenav-container--collapsed .sidenav-search-collapsed-item {
      display: flex;
    }
    /* Matches production positioning */
    .sidenav-features-item-icon.search {
      top: 9.5px;
      left: 11.5px;
      width: 12px;
    }
    /* search icon is a filled green path — prevent the global stroke override */
    .sidenav-features-item-icon.search path {
      fill: #22AD01 !important;
      stroke: none !important;
    }
  </style>
</head>
<body>
  <div id="outer-wrapper" class="with-sidebar with-sidebar-expanded">

    <!-- ========== SIDEBAR ========== -->
    <div class="sidenav-container theme-default">
      <nav class="sidenav">
        <!-- Top Section (sticky) -->
        <div class="sidenav-top-section">
          <!-- Company Switcher + Collapse Toggle -->
          <div class="sidenav-company-section">
            <div class="sidenav-company-menu">
              <div class="sidenav-company-menu-link">
                <div class="sidenav-company-menu-avatar avatar-img avatar-xs" style="background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border-radius: 6px;">B</div>
                <div class="sidenav-company-menu-details">
                  <div class="sidenav-navigation-company-name overflow-ellipsis">Bonsai Demo</div>
                </div>
                <svg class="sidenav-company-menu-arrow" width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
            <div id="sidebar-toggle" class="sidenav-company-switcher-collapse-toggle" data-tooltip="Hide sidebar" onclick="toggleSidebar()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M6 2v12"/></svg>
            </div>
          </div>

          <!-- Search (expanded: full input; collapsed: icon-only nav item) -->
          <div class="sidenav-top-section-search">
            <div class="form-field cursor-pointer relative input-sm with-icon sidenav-top-section-search-input">
              <svg class="sidenav-top-section-search-icon form-field-icon icon-left" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <span class="sidenav-top-section-search-label">Search</span>
              <div class="sidenav-top-section-search-command-key">&#8984;K</div>
            </div>
            <!-- Collapsed state: renders as a sidenav-features-item with a green search icon -->
            <a class="sidenav-features-item sidenav-search-collapsed-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon search" width="20" height="21" viewBox="0 0 20 21" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19.657 18.3393L15.5348 14.217C15.5052 14.1875 15.4716 14.165 15.4393 14.1392C17.8307 10.8098 17.5388 6.14868 14.5457 3.15562C12.8819 1.49182 10.7013 0.660156 8.52071 0.660156C6.3401 0.660156 4.1595 1.49182 2.4957 3.15562C-0.8319 6.48322 -0.8319 11.878 2.4957 15.2056C4.1595 16.8694 6.3401 17.7011 8.52071 17.7011C10.4071 17.7011 12.2916 17.0756 13.8434 15.8307C13.8555 15.8442 13.865 15.8597 13.8781 15.8729L18.0003 19.9951C18.2289 20.2247 18.5288 20.339 18.8287 20.339C19.1285 20.339 19.4284 20.2247 19.657 19.996C20.1143 19.5383 20.1143 18.7966 19.657 18.3393ZM8.52069 15.3589C6.87045 15.3589 5.31912 14.716 4.15198 13.5494C1.7432 11.1406 1.7432 7.22123 4.15198 4.81245C5.31868 3.64575 6.87047 3.00298 8.52069 3.00298C10.1709 3.00298 11.7222 3.64584 12.8894 4.81245C15.2982 7.22123 15.2982 11.1406 12.8894 13.5494C11.7222 14.716 10.1709 15.3589 8.52069 15.3589Z" fill="#22AD01" shape-rendering="auto"></path></svg>
            </a>
          </div>

          <!-- Top Links -->
          <div class="sidenav-top-section-links">
            <a class="sidenav-features-item active" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon home" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 7.5L10 2L17 7.5V16.5C17 17.0523 16.5523 17.5 16 17.5H4C3.44772 17.5 3 17.0523 3 16.5V7.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7.5 17.5V10.5H12.5V17.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
              <span class="sidenav-features-item-label">Home</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon notifications" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M15 7A5 5 0 0 0 5 7c0 5.5-2 7-2 7h14s-2-1.5-2-7Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8.5 17a2 2 0 0 0 3 0" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
              <span class="sidenav-features-item-label">Notifications</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon clients" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 8h6M7 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span class="sidenav-features-item-label">Clients</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon contacts" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M3.5 17.5c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
              <span class="sidenav-features-item-label">Contacts</span>
            </a>
          </div>
        </div>

        <!-- Workspace Section — matches prod nav order -->
        <div class="sidenav-link-section">
          <div class="sidenav-link-section-header">
            <span class="sidenav-link-section-header-label">Workspace</span>
          </div>
          <div class="sidenav-draggable-list">
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon deals" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="6" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M6 6V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
              <span class="sidenav-features-item-label">Deals</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon scheduling-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M13 2v4M7 2v4M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span class="sidenav-features-item-label">Scheduling</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon tasks" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              <span class="sidenav-features-item-label">Tasks</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon client-portal" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 2h12a1 1 0 011 1v14l-2.5-1.5L12 17l-2.5-1.5L7 17l-2.5-1.5L4 17V3a1 1 0 00-1 0z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
              <span class="sidenav-features-item-label">Client Portal</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon timetracking" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="11" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 7.5V11l2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span class="sidenav-features-item-label">Time Tracking</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <!-- meetings: custom class defined in <style> above -->
              <svg class="sidenav-features-item-icon meetings" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="1" y="5" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M13 9l5-2.5v7L13 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="sidenav-features-item-label">Meetings</span>
            </a>
            <a class="sidenav-features-item" href="#">
              <div class="sidenav-features-item-bg"></div>
              <svg class="sidenav-features-item-icon more" width="20" height="20" viewBox="0 0 20 20"><circle cx="4.5" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="15.5" cy="10" r="1.5"/></svg>
              <span class="sidenav-features-item-label">More</span>
            </a>
          </div>
        </div>

        <!-- Bottom Links -->
        <div class="sidenav-navigation-bottom-links">
          <a class="sidenav-features-item" href="#">
            <div class="sidenav-features-item-bg"></div>
            <svg class="sidenav-features-item-icon reports" width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="10" width="3" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="8.5" y="6" width="3" height="11" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="3" height="14" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            <span class="sidenav-features-item-label">Reports</span>
          </a>
          <a class="sidenav-features-item" href="#">
            <div class="sidenav-features-item-bg"></div>
            <svg class="sidenav-features-item-icon automation" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M11 2L4 11h7l-2 7 7-9h-7l2-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="sidenav-features-item-label">Automations</span>
          </a>
          <a class="sidenav-features-item" href="#">
            <div class="sidenav-features-item-bg"></div>
            <svg class="sidenav-features-item-icon support" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7.5 7.8a2.5 2.5 0 014.8.9c0 1.7-2.3 2.3-2.3 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="10" cy="15" r="0.75" fill="currentColor"/></svg>
            <span class="sidenav-features-item-label">Support</span>
          </a>
        </div>
      </nav>
    </div>

    <!-- ========== MAIN CONTENT AREA ========== -->
    <div class="page-content page-content-with-header">

      <!-- Top Navigation Bar -->
      <nav id="navigation">
        <div class="navigation-right clearfix">
          <!-- User avatar placeholder -->
          <div style="display: flex; align-items: center; height: 60px; padding-right: 20px;">
            <div class="avatar-img avatar-xs" style="background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border-radius: 50%;">MN</div>
          </div>
        </div>
      </nav>

      <!-- ====================================================== -->
      <!-- PROTOTYPE CONTENT GOES HERE                             -->
      <!-- Replace everything inside this <main> tag               -->
      <!-- ====================================================== -->
      <main class="wrapper-full-width app-page">

        <!-- Example: Page with header and tabs -->
        <div class="page-header with-nav">
          <div class="wrapper-full-width">
            <h1 class="page-title">Page Title</h1>
          </div>
          <div class="page-header-nav">
            <a class="page-header-nav-item active">All</a>
            <a class="page-header-nav-item">Active</a>
            <a class="page-header-nav-item">Archived</a>
          </div>
        </div>

        <!-- Example: Content area -->
        <div class="wrapper-full-width pa20">
          <p style="color: var(--text-muted);">Replace this content with your prototype.</p>
        </div>

      </main>

    </div>
  </div>

  <script>
    /* ── Sidebar collapse / expand ── */
    function toggleSidebar() {
      const container = document.querySelector('.sidenav-container');
      const outer = document.getElementById('outer-wrapper');
      const btn = document.getElementById('sidebar-toggle');
      const isCollapsed = container.classList.toggle('sidenav-container--collapsed');
      if (isCollapsed) {
        outer.classList.remove('with-sidebar-expanded');
        btn.setAttribute('data-tooltip', 'Show sidebar');
      } else {
        outer.classList.add('with-sidebar-expanded');
        btn.setAttribute('data-tooltip', 'Hide sidebar');
      }
    }
  </script>
</body>
</html>
